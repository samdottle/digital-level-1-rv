<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:#0a0f1e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
@keyframes bounce-up{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes toastIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.bounce-up{animation:bounce-up 0.9s ease-in-out infinite}
.spin-slow{animation:spin 1s linear infinite}
.toast-in{animation:toastIn 0.3s ease-out forwards}
input[type=range]{-webkit-appearance:none;appearance:none;height:28px;background:transparent;cursor:pointer}
input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:3px;background:#334155}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fbbf24;margin-top:-8px;border:2px solid #0a0f1e}
</style>

<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef,useCallback,useMemo}=React;
const h=React.createElement;

// ── Constants ────────────────────────────────────────────────────────────────
const SERVICE_UUID='6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const TX_UUID     ='6e400002-b5a3-f393-e0a9-e50e24dcca9e';
const RX_UUID     ='6e400003-b5a3-f393-e0a9-e50e24dcca9e';
const EMA_ALPHA   = 0.05;
const THRESHOLD   = 0.5;
const MAX_DEG     = 3;
const WHEELBASE   = 120; // inches front-to-rear
const TRACK       = 96;  // inches left-to-right
const DEFAULT_JACKS = {LF:0,RF:0,LR:0,RR:0};

// ── Helpers ──────────────────────────────────────────────────────────────────
function clamp(v,mn,mx){return Math.min(Math.max(v,mn),mx)}
function sign(v){return v>0?'+':''}
function pitchColor(deg,thr){
  const a=Math.abs(deg);
  if(a<=thr) return '#34d399';
  if(a<=thr*2) return '#facc15';
  return '#f87171';
}
function jacksToPitchRoll(j){
  const frontAvg=(j.LF+j.RF)/2, rearAvg=(j.LR+j.RR)/2;
  const leftAvg=(j.LF+j.LR)/2,  rightAvg=(j.RF+j.RR)/2;
  return {
    pitch: Math.atan((frontAvg-rearAvg)/WHEELBASE)*(180/Math.PI),
    roll:  Math.atan((rightAvg-leftAvg)/TRACK)*(180/Math.PI),
  };
}
function randomJacks(){
  return {LF:parseFloat((Math.random()*4).toFixed(1)),RF:parseFloat((Math.random()*4).toFixed(1)),
          LR:parseFloat((Math.random()*4).toFixed(1)),RR:parseFloat((Math.random()*4).toFixed(1))};
}
function cornerHeight(id,pitch,roll){
  if(id==='FL') return  pitch-roll;
  if(id==='FR') return  pitch+roll;
  if(id==='RL') return -pitch-roll;
  if(id==='RR') return -pitch+roll;
  return 0;
}

// ── Toast ────────────────────────────────────────────────────────────────────
function useToast(){
  const [toasts,setToasts]=useState([]);
  const show=useCallback((msg,type='info')=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000);
  },[]);
  return {toasts,show};
}
function ToastContainer({toasts}){
  return h('div',{style:{position:'fixed',bottom:'1.5rem',left:'50%',transform:'translateX(-50%)',zIndex:1000,display:'flex',flexDirection:'column',gap:'8px',alignItems:'center',pointerEvents:'none'}},
    toasts.map(t=>h('div',{key:t.id,className:`toast-in px-4 py-2 rounded-full text-sm font-medium shadow-lg ${t.type==='error'?'bg-red-500/90 text-white':t.type==='success'?'bg-emerald-500/90 text-white':'bg-slate-700/95 text-slate-200'}`},t.msg))
  );
}

// ── SVG RV Top View ──────────────────────────────────────────────────────────
// Clean top-down RV outline, owned SVG, no CDN dependency
function RVOutlineSVG(){
  return h('svg',{viewBox:'0 0 320 200',xmlns:'http://www.w3.org/2000/svg',className:'w-full h-full'},
    // Main coach body
    h('rect',{x:70,y:30,width:200,height:140,rx:12,fill:'#0f172a',stroke:'#fbbf24',strokeWidth:2,opacity:0.9}),
    // Cab / front section
    h('rect',{x:70,y:50,width:55,height:100,rx:8,fill:'#1e293b',stroke:'#fbbf24',strokeWidth:1.5}),
    // Windshield
    h('rect',{x:74,y:62,width:44,height:38,rx:4,fill:'#0a0f1e',stroke:'#fbbf24',strokeWidth:1,opacity:0.7}),
    // Side windows (coach)
    h('rect',{x:138,y:48,width:32,height:24,rx:3,fill:'#0a0f1e',stroke:'#475569',strokeWidth:1}),
    h('rect',{x:180,y:48,width:32,height:24,rx:3,fill:'#0a0f1e',stroke:'#475569',strokeWidth:1}),
    h('rect',{x:222,y:48,width:32,height:24,rx:3,fill:'#0a0f1e',stroke:'#475569',strokeWidth:1}),
    h('rect',{x:138,y:128,width:32,height:24,rx:3,fill:'#0a0f1e',stroke:'#475569',strokeWidth:1}),
    h('rect',{x:180,y:128,width:32,height:24,rx:3,fill:'#0a0f1e',stroke:'#475569',strokeWidth:1}),
    h('rect',{x:222,y:128,width:32,height:24,rx:3,fill:'#0a0f1e',stroke:'#475569',strokeWidth:1}),
    // Rear cap
    h('rect',{x:256,y:55,width:12,height:90,rx:4,fill:'#1e293b',stroke:'#fbbf24',strokeWidth:1.5}),
    // Roof AC units
    h('rect',{x:155,y:25,width:36,height:10,rx:3,fill:'#334155',stroke:'#475569',strokeWidth:1}),
    h('rect',{x:205,y:25,width:36,height:10,rx:3,fill:'#334155',stroke:'#475569',strokeWidth:1}),
    // Wheels (4 corners)
    h('rect',{x:75,y:18,width:28,height:14,rx:4,fill:'#334155',stroke:'#64748b',strokeWidth:1.5}),
    h('rect',{x:75,y:168,width:28,height:14,rx:4,fill:'#334155',stroke:'#64748b',strokeWidth:1.5}),
    h('rect',{x:240,y:18,width:28,height:14,rx:4,fill:'#334155',stroke:'#64748b',strokeWidth:1.5}),
    h('rect',{x:240,y:168,width:28,height:14,rx:4,fill:'#334155',stroke:'#64748b',strokeWidth:1.5}),
    // Hitch (front = left side in top view)
    h('rect',{x:50,y:90,width:22,height:20,rx:3,fill:'#334155',stroke:'#64748b',strokeWidth:1.5}),
    h('line',{x1:50,y1:100,x2:30,y2:100,stroke:'#64748b',strokeWidth:2}),
  );
}

// ── RV Bulls-Eye ─────────────────────────────────────────────────────────────
const CORNERS=[
  {id:'FL',label:'LF',cx:'25%',cy:'22%'},
  {id:'FR',label:'RF',cx:'75%',cy:'22%'},
  {id:'RL',label:'LR',cx:'25%',cy:'78%'},
  {id:'RR',label:'RR',cx:'75%',cy:'78%'},
];

function JackPin({corner,height,maxH,threshold}){
  const deficit=maxH-height;
  const isRef=deficit<0.05;
  let bg,bdr,col;
  if(isRef)           {bg='rgba(100,116,139,0.7)';bdr='rgba(148,163,184,0.5)';col='#94a3b8';}
  else if(deficit<=threshold){bg='rgba(52,211,153,0.25)';bdr='rgba(52,211,153,0.8)';col='#34d399';}
  else if(deficit<=threshold*2){bg='rgba(250,204,21,0.25)';bdr='rgba(250,204,21,0.8)';col='#facc15';}
  else               {bg='rgba(248,113,113,0.25)';bdr='rgba(248,113,113,0.8)';col='#f87171';}

  return h('div',{style:{position:'absolute',left:corner.cx,top:corner.cy,transform:'translate(-50%,-50%)',zIndex:20,display:'flex',flexDirection:'column',alignItems:'center',gap:'2px'}},
    !isRef && deficit>0.05 && h('div',{className:'bounce-up',style:{color:col,fontSize:'14px',lineHeight:1}},'\u25B2'),
    h('div',{style:{background:bg,border:`1.5px solid ${bdr}`,backdropFilter:'blur(4px)',borderRadius:'8px',padding:'4px 6px',display:'flex',flexDirection:'column',alignItems:'center',minWidth:'40px'}},
      // Scissor jack icon
      h('svg',{width:20,height:14,viewBox:'0 0 20 14',fill:'none'},
        h('rect',{x:0,y:11,width:20,height:3,rx:1,fill:col,opacity:0.8}),
        h('rect',{x:0,y:0,width:20,height:3,rx:1,fill:col,opacity:0.8}),
        h('line',{x1:4,y1:11,x2:10,y2:3,stroke:col,strokeWidth:1.5,opacity:0.9}),
        h('line',{x1:16,y1:11,x2:10,y2:3,stroke:col,strokeWidth:1.5,opacity:0.9}),
        h('line',{x1:4,y1:3,x2:10,y2:11,stroke:col,strokeWidth:1.5,opacity:0.6}),
        h('line',{x1:16,y1:3,x2:10,y2:11,stroke:col,strokeWidth:1.5,opacity:0.6}),
      ),
      h('span',{style:{fontSize:'11px',fontWeight:700,color:col,lineHeight:1,marginTop:'2px'}},corner.label)
    ),
    !isRef && deficit>0.05 && h('div',{style:{fontSize:'12px',fontFamily:'monospace',fontWeight:700,color:col,textShadow:'0 1px 4px rgba(0,0,0,0.8)',lineHeight:1}},
      `+${deficit.toFixed(2)}\u00B0`
    )
  );
}

function RVBullsEye({pitch,roll,threshold,isLevel}){
  const SIZE=300;
  const R=SIZE/2;
  // Bubble position: roll pushes left/right, pitch pushes front/back
  const bubbleX=clamp(-roll/MAX_DEG,-1,1)*(R*0.65);
  const bubbleY=clamp(pitch/MAX_DEG,-1,1)*(R*0.65);
  const levelZoneR=(threshold/MAX_DEG)*(R*0.65);
  const bubbleCol=pitchColor(Math.max(Math.abs(pitch),Math.abs(roll)),threshold);

  const heights=CORNERS.map(c=>({...c,h:cornerHeight(c.id,pitch,roll)}));
  const maxH=Math.max(...heights.map(c=>c.h));

  return h('div',{style:{position:'relative',width:SIZE,height:SIZE,borderRadius:'16px',overflow:'hidden',border:'1px solid rgba(71,85,105,0.5)',boxShadow:'0 4px 32px rgba(0,0,0,0.5)'}},
    // RV SVG background
    h('div',{style:{position:'absolute',inset:0,opacity:0.9}}, h(RVOutlineSVG)),
    // Dark overlay
    h('div',{style:{position:'absolute',inset:0,background:'rgba(10,15,30,0.25)'}}),
    // Jack advisory pins
    ...heights.map(c=>h(JackPin,{key:c.id,corner:c,height:c.h,maxH,threshold})),
    // Orientation labels
    h('div',{style:{position:'absolute',top:'6px',left:'50%',transform:'translateX(-50%)',zIndex:30}},
      h('div',{style:{background:'rgba(251,191,36,0.85)',backdropFilter:'blur(4px)',borderRadius:'6px',padding:'2px 8px',border:'1px solid rgba(251,191,36,0.6)'}},
        h('span',{style:{fontSize:'10px',fontWeight:900,color:'white',letterSpacing:'0.1em'}},'\u25B2 FRONT')
      )
    ),
    h('div',{style:{position:'absolute',bottom:'6px',left:'50%',transform:'translateX(-50%)',zIndex:30}},
      h('span',{style:{fontSize:'10px',fontWeight:700,color:'rgba(255,255,255,0.4)',letterSpacing:'0.1em'}},'\u25BC REAR')
    ),
    h('div',{style:{position:'absolute',left:'4px',top:'50%',transform:'translateY(-50%)',zIndex:30}},
      h('span',{style:{fontSize:'9px',fontWeight:700,color:'rgba(255,255,255,0.4)',writingMode:'vertical-rl',transform:'rotate(180deg)'}},'\u25C4 L')
    ),
    h('div',{style:{position:'absolute',right:'4px',top:'50%',transform:'translateY(-50%)',zIndex:30}},
      h('span',{style:{fontSize:'9px',fontWeight:700,color:'rgba(255,255,255,0.4)',writingMode:'vertical-rl'}},'R \u25BA')
    ),
    // Bulls-eye SVG overlay
    h('svg',{style:{position:'absolute',inset:0,width:'100%',height:'100%'},viewBox:`${-R} ${-R} ${R*2} ${R*2}`,preserveAspectRatio:'xMidYMid meet'},
      // Outer ring
      h('circle',{cx:0,cy:0,r:R*0.82,fill:'none',stroke:'rgba(255,255,255,0.12)',strokeWidth:1.5}),
      // Mid ring
      h('circle',{cx:0,cy:0,r:R*0.52,fill:'none',stroke:'rgba(255,255,255,0.1)',strokeWidth:1}),
      // Level zone
      h('circle',{cx:0,cy:0,r:levelZoneR,
        fill:isLevel?'rgba(52,211,153,0.15)':'rgba(52,211,153,0.06)',
        stroke:isLevel?'rgba(52,211,153,0.7)':'rgba(52,211,153,0.35)',
        strokeWidth:1.5}),
      // Crosshairs
      h('line',{x1:-R*0.82,y1:0,x2:R*0.82,y2:0,stroke:'rgba(255,255,255,0.12)',strokeWidth:1}),
      h('line',{x1:0,y1:-R*0.82,x2:0,y2:R*0.82,stroke:'rgba(255,255,255,0.12)',strokeWidth:1}),
      // Bubble — CSS transition for smooth movement
      h('g',{style:{transition:'transform 0.12s ease-out'},transform:`translate(${bubbleX},${bubbleY})`},
        h('circle',{cx:0,cy:0,r:20,fill:'rgba(0,0,0,0.35)'}),
        h('circle',{cx:0,cy:0,r:18,fill:bubbleCol,fillOpacity:0.6,stroke:bubbleCol,strokeWidth:2}),
        h('circle',{cx:-5,cy:-5,r:5,fill:'rgba(255,255,255,0.35)'})
      )
    )
  );
}

// ── Tilt Bars ────────────────────────────────────────────────────────────────
function TiltBar({label,value,threshold,leftLabel,rightLabel}){
  const pct=clamp(value/MAX_DEG,-1,1);
  const col=pitchColor(value,threshold);
  const tZoneW=(threshold/MAX_DEG)*50; // % each side
  return h('div',{className:'flex-1'},
    h('div',{className:'flex justify-between items-center mb-1'},
      h('span',{className:'text-xs text-slate-500'},label),
      h('span',{className:'text-xs font-mono font-semibold text-slate-300'},`${sign(value)}${value.toFixed(2)}\u00B0`)
    ),
    h('div',{style:{position:'relative',height:'12px',borderRadius:'6px',background:'#1e293b',border:'1px solid #334155',overflow:'hidden'}},
      h('div',{style:{position:'absolute',top:0,bottom:0,background:'rgba(52,211,153,0.18)',borderLeft:'1px solid rgba(52,211,153,0.3)',borderRight:'1px solid rgba(52,211,153,0.3)',left:`${50-tZoneW}%`,width:`${tZoneW*2}%`}}),
      h('div',{style:{position:'absolute',top:0,bottom:0,left:'50%',width:'1px',background:'rgba(100,116,139,0.5)'}}),
      h('div',{style:{position:'absolute',top:'2px',bottom:'2px',width:'10px',borderRadius:'5px',background:col,left:`calc(50% + ${pct*45}% - 5px)`,transition:'left 0.1s ease-out'}})
    ),
    h('div',{className:'flex justify-between text-xs text-slate-700 mt-0.5'},
      h('span',null,leftLabel),
      h('span',null,rightLabel)
    )
  );
}

// ── Jack Demo Controls ────────────────────────────────────────────────────────
function JackSlider({jackKey,label,value,onChange}){
  return h('div',{className:'flex flex-col items-center gap-1 p-3 rounded-xl border',style:{background:'rgba(30,41,59,0.6)',borderColor:'#334155'}},
    h('p',{className:'text-xs font-semibold text-slate-400 uppercase tracking-wider'},label),
    h('p',{className:'text-lg font-mono font-bold text-amber-300'},`${value.toFixed(1)}"`),
    h('input',{type:'range',min:0,max:6,step:0.1,value,onChange:e=>onChange(jackKey,parseFloat(e.target.value)),style:{width:'100%'}}),
    h('div',{className:'flex justify-between w-full text-xs text-slate-600'},h('span',null,'0"'),h('span',null,'6"'))
  );
}
function JackDemoControls({jacks,onChange,onReset,onRandomize}){
  const layout=[
    {key:'LF',label:'Left Front'},{key:'RF',label:'Right Front'},
    {key:'LR',label:'Left Rear'}, {key:'RR',label:'Right Rear'},
  ];
  return h('div',{className:'space-y-3'},
    h('div',{className:'flex items-center justify-between'},
      h('p',{className:'text-xs font-semibold text-amber-300 uppercase tracking-wider'},'Jack Demo Controls'),
      h('div',{className:'flex gap-2'},
        h('button',{onClick:onRandomize,className:'px-2.5 py-1 rounded-lg border border-slate-600 text-xs text-slate-400 hover:border-amber-500/50 hover:text-amber-300 transition-all'},'Random'),
        h('button',{onClick:onReset,className:'px-2.5 py-1 rounded-lg border border-slate-600 text-xs text-slate-400 hover:border-slate-400 hover:text-white transition-all'},'Reset')
      )
    ),
    h('div',{className:'grid grid-cols-2 gap-2'},
      layout.map(j=>h(JackSlider,{key:j.key,jackKey:j.key,label:j.label,value:jacks[j.key],onChange}))
    ),
    h('p',{className:'text-xs text-slate-600 text-center'},'Slide each jack to simulate extension height (inches)')
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App(){
  const {toasts,show:toast}=useToast();

  // BLE
  const [isConnecting,setIsConnecting]=useState(false);
  const [isConnected,setIsConnected]=useState(false);
  const [deviceName,setDeviceName]=useState('');
  const txCharRef=useRef(null);
  const deviceRef=useRef(null);
  const emaPitchRef=useRef(null);
  const emaRollRef=useRef(null);

  // Readings
  const [pitchDeg,setPitchDeg]=useState(0);
  const [rollDeg, setRollDeg] =useState(0);

  // Local tare offset
  const localPitchOffsetRef=useRef(0);
  const localRollOffsetRef =useRef(0);

  // Demo modes
  const [demoMode,setDemoMode]=useState(false);   // jack sliders
  const [jacks,setJacks]=useState(DEFAULT_JACKS);
  const [simActive,setSimActive]=useState(false);  // auto-sweep
  const [simPitch,setSimPitch]=useState(0);
  const simRef=useRef(null);

  // Display
  const jackTilt=useMemo(()=>jacksToPitchRoll(jacks),[jacks]);
  const displayPitch=demoMode?jackTilt.pitch:simActive?simPitch:pitchDeg;
  const displayRoll =demoMode?jackTilt.roll :simActive?0           :rollDeg;

  const pitchLevel=Math.abs(displayPitch)<=THRESHOLD;
  const rollLevel =Math.abs(displayRoll) <=THRESHOLD;
  const isLevel   =pitchLevel&&rollLevel;

  // Auto-sweep
  const toggleSim=useCallback(()=>{
    if(simActive){clearInterval(simRef.current);setSimActive(false);setSimPitch(0);}
    else{
      setDemoMode(false);
      const t0=Date.now();setSimActive(true);
      simRef.current=setInterval(()=>{
        const t=(Date.now()-t0)/1000;
        setSimPitch(parseFloat((Math.sin(t*0.6)*2.5).toFixed(2)));
      },40);
    }
  },[simActive]);
  useEffect(()=>()=>{clearInterval(simRef.current)},[]);

  // BLE
  const sendCommand=useCallback(async(cmd)=>{
    if(!txCharRef.current)return;
    try{await txCharRef.current.writeValue(new TextEncoder().encode(cmd+'\n'));}catch(_){}
  },[]);

  const onData=useCallback((e)=>{
    const val=new TextDecoder().decode(e.target.value).trim();
    const m=val.match(/P:([-\d.]+),R:([-\d.]+)/);
    if(!m)return;
    const rp=parseFloat(m[1]),rr=parseFloat(m[2]);
    if(emaPitchRef.current===null){emaPitchRef.current=rp;emaRollRef.current=rr;}
    else{emaPitchRef.current=EMA_ALPHA*rp+(1-EMA_ALPHA)*emaPitchRef.current;
         emaRollRef.current =EMA_ALPHA*rr+(1-EMA_ALPHA)*emaRollRef.current;}
    const cp=emaPitchRef.current-localPitchOffsetRef.current;
    const cr=emaRollRef.current -localRollOffsetRef.current;
    setPitchDeg(parseFloat(cp.toFixed(2)));
    setRollDeg( parseFloat(cr.toFixed(2)));
  },[]);

  const onDisconnected=useCallback(()=>{
    setIsConnected(false);txCharRef.current=null;
    emaPitchRef.current=null;emaRollRef.current=null;
    localPitchOffsetRef.current=0;localRollOffsetRef.current=0;
    toast('Disconnected from device');
  },[toast]);

  const connectBLE=useCallback(async()=>{
    if(!navigator.bluetooth){toast('Web Bluetooth requires Chrome on Android or desktop Chrome','error');return;}
    setIsConnecting(true);
    try{
      const device=await navigator.bluetooth.requestDevice({filters:[{services:[SERVICE_UUID]}],optionalServices:[SERVICE_UUID]});
      device.addEventListener('gattserverdisconnected',onDisconnected);
      deviceRef.current=device;
      let server;
      for(let i=1;i<=3;i++){try{server=await device.gatt.connect();break;}catch(e){if(i===3)throw e;await new Promise(r=>setTimeout(r,1000));}}
      const svc=await server.getPrimaryService(SERVICE_UUID);
      const txCh=await svc.getCharacteristic(TX_UUID);txCharRef.current=txCh;
      try{const rxCh=await svc.getCharacteristic(RX_UUID);await rxCh.startNotifications();rxCh.addEventListener('characteristicvaluechanged',onData);}catch(_){}
      setDeviceName(device.name||'Level');setIsConnected(true);setSimActive(false);setDemoMode(false);
      toast(`Connected to ${device.name||'Level'}`,'success');
    }catch(err){if(err.name!=='NotFoundError')toast('Connection failed: '+err.message,'error');}
    setIsConnecting(false);
  },[onData,onDisconnected,toast]);

  const disconnectBLE=useCallback(()=>{
    if(deviceRef.current?.gatt?.connected)deviceRef.current.gatt.disconnect();
    setIsConnected(false);txCharRef.current=null;
  },[]);

  const statusColor=isConnected?'#34d399':(simActive||demoMode)?'#c084fc':'#475569';
  const statusLabel=isConnected?deviceName:simActive?'Auto demo':demoMode?'Jack demo':'Not connected';

  return h(React.Fragment,null,
    h('div',{className:'min-h-screen text-white',style:{background:'linear-gradient(135deg,#020617,#0f172a,#020617)'}},

      // Header
      h('header',{className:'sticky top-0 z-50 border-b',style:{background:'rgba(2,6,23,0.85)',backdropFilter:'blur(12px)',borderColor:'#1e293b'}},
        h('div',{className:'max-w-md mx-auto px-4 py-3 flex items-center justify-between'},
          h('div',{className:'flex items-center gap-2.5'},
            // RV icon
            h('svg',{width:28,height:20,viewBox:'0 0 28 20',fill:'none'},
              h('rect',{x:4,y:2,width:22,height:16,rx:3,stroke:'#fbbf24',strokeWidth:1.5,fill:'none'}),
              h('rect',{x:4,y:5,width:7,height:10,rx:2,stroke:'#fbbf24',strokeWidth:1,fill:'none'}),
              h('circle',{cx:8,cy:18,r:2,fill:'#fbbf24',opacity:0.7}),
              h('circle',{cx:20,cy:18,r:2,fill:'#fbbf24',opacity:0.7}),
              h('line',{x1:0,y1:10,x2:4,y2:10,stroke:'#fbbf24',strokeWidth:1.5}),
            ),
            h('div',null,
              h('h1',{className:'text-sm font-semibold text-white leading-none'},'Digital Level 1 RV'),
              h('p',{className:'text-xs text-slate-500 leading-none mt-0.5'},'MPU-6050 \u00B7 ESP32 \u00B7 BLE \u00B7 v1.0')
            )
          ),
          h('div',{className:'flex items-center gap-1.5 px-2.5 py-1 rounded-full border text-xs font-medium',
            style:{borderColor:statusColor+'50',background:statusColor+'18'}},
            h('span',{style:{width:6,height:6,borderRadius:'50%',background:statusColor,display:'inline-block'}}),
            h('span',{style:{color:statusColor}},statusLabel)
          )
        )
      ),

      h('main',{className:'max-w-md mx-auto px-4 py-4 space-y-4 pb-10'},

        // BLE Card
        h('div',{className:'rounded-2xl border p-4',style:{background:'rgba(15,23,42,0.5)',borderColor:'#1e293b'}},
          h('div',{className:'flex items-center justify-between'},
            h('div',{className:'flex items-center gap-3'},
              h('div',{className:'p-2 rounded-full',style:{background:isConnected?'rgba(52,211,153,0.2)':'rgba(30,41,59,0.5)'}},
                h('span',{style:{fontSize:18}},isConnected?'\uD83D\uDCF6':'\uD83D\uDCF5')
              ),
              h('div',null,
                h('p',{className:'text-sm font-medium text-white'},isConnected?deviceName:'Not Connected'),
                h('p',{className:'text-xs text-slate-500'},isConnected?'Streaming live tilt data':'Tap Connect to pair via BLE')
              )
            ),
            h('div',{className:'flex items-center gap-2'},
              // Auto-sweep button
              h('button',{onClick:toggleSim,disabled:isConnected,title:simActive?'Stop simulation':'Auto-sweep demo',
                className:'p-1.5 rounded-lg border text-xs transition-all',
                style:{background:simActive?'rgba(192,132,252,0.2)':'rgba(30,41,59,0.6)',
                       borderColor:simActive?'rgba(192,132,252,0.4)':'#334155',
                       color:simActive?'#c084fc':'#64748b',
                       opacity:isConnected?0.3:1,cursor:isConnected?'not-allowed':'pointer'}},
                simActive
                  ? h('svg',{width:16,height:16,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2},h('rect',{x:6,y:6,width:12,height:12,rx:1}))
                  : h('svg',{width:16,height:16,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2},h('polygon',{points:'5,3 19,12 5,21'}))
              ),
              // Jack demo toggle
              h('button',{
                onClick:()=>{setDemoMode(d=>{if(!d){setSimActive(false);clearInterval(simRef.current);setSimPitch(0);}return!d;});setJacks(randomJacks());},
                className:'p-1.5 rounded-lg border text-xs font-medium transition-all',
                style:{background:demoMode?'rgba(251,191,36,0.2)':'rgba(30,41,59,0.6)',
                       borderColor:demoMode?'rgba(251,191,36,0.4)':'#334155',
                       color:demoMode?'#fbbf24':'#64748b'}},
                demoMode?'\u25A0':'Jacks'
              ),
              // Connect button
              h('button',{onClick:isConnected?disconnectBLE:connectBLE,disabled:isConnecting,
                className:'flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium transition-all',
                style:{background:isConnected?'#334155':'#059669',color:'white',opacity:isConnecting?0.5:1,cursor:isConnecting?'not-allowed':'pointer'}},
                isConnecting
                  ? h('svg',{className:'spin-slow',width:16,height:16,viewBox:'0 0 24 24',fill:'none'},
                      h('circle',{cx:12,cy:12,r:10,stroke:'currentColor',strokeWidth:4,opacity:0.25}),
                      h('path',{d:'M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z',fill:'currentColor',opacity:0.75}))
                  : null,
                isConnected?'Disconnect':isConnecting?'Scanning\u2026':'Connect'
              )
            )
          )
        ),

        // Level Banner
        h('div',{className:'rounded-2xl border p-4 flex items-center justify-center gap-3 transition-all duration-300',
          style:{background:isLevel?'rgba(52,211,153,0.12)':'rgba(15,23,42,0.5)',
                 borderColor:isLevel?'rgba(52,211,153,0.5)':'rgba(51,65,85,0.5)'}},
          isLevel
            ? h(React.Fragment,null,
                h('span',{style:{fontSize:22}},'✓'),
                h('p',{className:'text-lg font-bold tracking-widest',style:{color:'#34d399'}},'\u2713  LEVEL'))
            : h(React.Fragment,null,
                h('span',{style:{fontSize:22}},'⚠'),
                h('p',{className:'text-lg font-bold tracking-widest',style:{color:'#fbbf24'}},'ADJUST NEEDED'))
        ),

        // Bird's-Eye
        h('div',{className:'flex justify-center'},
          h(RVBullsEye,{pitch:displayPitch,roll:displayRoll,threshold:THRESHOLD,isLevel})
        ),

        // Tilt bars
        h('div',{className:'rounded-2xl border p-4',style:{background:'rgba(15,23,42,0.4)',borderColor:'rgba(30,41,59,0.6)'}},
          h('div',{className:'flex gap-4'},
            h(TiltBar,{label:'Front / Back',value:displayPitch,threshold:THRESHOLD,leftLabel:'Nose Low',rightLabel:'Nose High'}),
            h(TiltBar,{label:'Left / Right', value:displayRoll, threshold:THRESHOLD,leftLabel:'Lean Left',rightLabel:'Lean Right'})
          )
        ),

        // Jack Demo Controls
        demoMode && h('div',{className:'rounded-2xl border p-4',style:{background:'rgba(15,23,42,0.5)',borderColor:'rgba(251,191,36,0.25)'}},
          h(JackDemoControls,{jacks,onChange:(k,v)=>setJacks(j=>({...j,[k]:v})),
            onReset:()=>setJacks(DEFAULT_JACKS),
            onRandomize:()=>setJacks(randomJacks())})
        ),

        // Tare
        h('button',{
          onClick:()=>{
            if(isConnected){
              localPitchOffsetRef.current+=pitchDeg;
              localRollOffsetRef.current +=rollDeg;
              setPitchDeg(0);setRollDeg(0);
              sendCommand(`TAR:${pitchDeg.toFixed(2)},${rollDeg.toFixed(2)}`);
              toast('Tared \u2014 display zeroed');
            }else{toast('Not connected \u2014 tare not applied');}
          },
          className:'w-full py-3 rounded-xl border text-sm font-medium transition-all',
          style:{background:'rgba(251,191,36,0.1)',borderColor:'rgba(251,191,36,0.3)',color:'#fbbf24'}
        },'Tare to Current Position'),

        // Footer
        h('div',{className:'text-center text-xs text-slate-600 pt-2 pb-4 space-y-1'},
          h('p',null,'Arduino Nano ESP32 + MPU-6050 \u00B7 BLE Nordic UART'),
          h('p',null,`Level tolerance \u00B1${THRESHOLD.toFixed(1)}\u00B0`),
          h('p',{className:'text-slate-700 mt-2'},'\u00A9 Digital Level 1 RV \u00B7 v1.0')
        )
      )
    ),
    h(ToastContainer,{toasts})
  );
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
